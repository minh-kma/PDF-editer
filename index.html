<!doctype html>
<!-- lang and <title> here are the pre-render defaults; shared/i18n/index.ts
     updates both to match the detected or chosen language. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- .ico first as the fallback for older browsers and crawlers (Google's
         favicon fetcher still probes /favicon.ico); SVG-capable browsers
         prefer the sharper vector version below. -->
    <link rel="icon" href="./favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free, private PDF editor that runs entirely in your browser. Merge, split, rotate, delete, reorder and compress PDFs — your files never leave your device."
    />
    <!-- SEO: this is the English homepage. The canonical + reciprocal hreflang
         alternates below are baked into the static HTML (not injected by JS) so
         Google can index the English and Vietnamese homepages as separate URLs.
         vi/index.html carries the mirror-image set. x-default points at English. -->
    <link rel="canonical" href="https://pdfchill.online/" />
    <link rel="alternate" hreflang="en" href="https://pdfchill.online/" />
    <link rel="alternate" hreflang="vi" href="https://pdfchill.online/vi/" />
    <link rel="alternate" hreflang="x-default" href="https://pdfchill.online/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>PDFChill — Free, private, in-browser PDF editor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
