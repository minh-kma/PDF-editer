<!doctype html>
<!-- Vietnamese homepage. This is a second static entry point that loads the
     exact same JS/CSS bundle as the English index.html (see vite.config.ts).
     The lang / title / description / canonical / hreflang below are baked in at
     build time so Google can crawl and index a real Vietnamese homepage at
     https://pdfchill.online/vi/ — none of it depends on JS running.
     shared/i18n/index.ts reads the /vi/ path and starts react-i18next in
     Vietnamese; the language switcher navigates between / and /vi/.
     NOTE: the Vietnamese title/description are a first-draft translation and
     still need a native-speaker review (see .claude/docs/features.md). -->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons live in public/ and are copied to the site root, so from the
         nested /vi/ page they are one level up. Same set as index.html — keep
         the two files in sync. -->
    <link rel="icon" href="../favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Trình chỉnh sửa PDF miễn phí, riêng tư, chạy hoàn toàn trong trình duyệt. Gộp, tách, xoay, xóa, sắp xếp lại và nén PDF — tệp của bạn không bao giờ rời khỏi thiết bị."
    />
    <link rel="canonical" href="https://pdfchill.online/vi/" />
    <link rel="alternate" hreflang="en" href="https://pdfchill.online/" />
    <link rel="alternate" hreflang="vi" href="https://pdfchill.online/vi/" />
    <link rel="alternate" hreflang="x-default" href="https://pdfchill.online/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>PDFChill — Trình chỉnh sửa PDF miễn phí, riêng tư, ngay trong trình duyệt</title>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "PDFChill",
  "url": "https://pdfchill.online/vi/",
  "description": "Trình chỉnh sửa PDF miễn phí, riêng tư, chạy hoàn toàn trong trình duyệt. Gộp, tách, xoay, xóa, sắp xếp lại và nén PDF — tệp của bạn không bao giờ rời khỏi thiết bị.",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "Any (runs in any modern web browser)",
  "inLanguage": "vi",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "featureList": [
    "Gộp file PDF",
    "Tách file PDF",
    "Nén file PDF",
    "Chuyển ảnh sang PDF",
    "Xoay, xóa và sắp xếp lại trang"
  ]
}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
