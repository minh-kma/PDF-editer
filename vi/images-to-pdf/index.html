<!doctype html>
<!-- Vietnamese page for the imagesToPdf tool. One of the per-tool static entries
     (see vite.config.ts): it loads the exact same JS/CSS bundle as every other
     page, and the URL's tool + language segments are what select the tool and
     the language at runtime (src/shared/lib/routes.ts). The head below is baked
     at build time so a crawler sees it without running JS.
     NOTE: the Vietnamese title/description are a first-draft translation and
     still need a native-speaker review (see .claude/docs/features.md). -->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons live in public/ and are copied to the site root; from this
         page that is two levels up. Vite does not rewrite public-dir
         paths, so the depth is set by hand here. -->
    <link rel="icon" href="../../favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chuyển ảnh JPG và PNG thành file PDF. Sắp xếp lại và xoay ảnh trước, chọn khổ giấy và lề, rồi nhận một file PDF hoặc mỗi ảnh một file. Miễn phí, và không có gì được tải lên."
    />
    <!-- Canonical points at this page, and the hreflang trio at this tool's own
         English/Vietnamese pair — not at the homepage. -->
    <link rel="canonical" href="https://pdfchill.online/vi/images-to-pdf/" />
    <link rel="alternate" hreflang="en" href="https://pdfchill.online/images-to-pdf/" />
    <link rel="alternate" hreflang="vi" href="https://pdfchill.online/vi/images-to-pdf/" />
    <link rel="alternate" hreflang="x-default" href="https://pdfchill.online/images-to-pdf/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Ảnh sang PDF — chuyển JPG và PNG thành PDF | PDFChill</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
